<!doctype html>
<html lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IPA Translator - Arabic (العربية)</title>
    <link rel="icon" href="../favicon.svg" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="header">
      <div class="titles">
        <h1>مترجم IPA</h1>
        <h2>Arabic (العربية)</h2>
      </div>
      <button id="dark-mode-toggle" class="btn-theme" aria-label="Toggle dark mode">
        <img src="../img/light-mode.svg" class="icon" alt="" />
      </button>
    </div>
    <hr />

    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>النص العربي / Arabic paragraph</label>
          <textarea id="cWords_tBox" rows="10" placeholder="Input some Arabic words.">اللغة العربية لغة جميلة وغنية بالأدب والشعر.</textarea>
        </div>
      </div>

      <div class="col">
        <div class="form-group">
          <label>IPA</label>
          <textarea id="IPA_tBox" rows="10" disabled></textarea>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-12">
        <div class="form-check-inline">
          <input type="checkbox" id="wf_c_words" checked />
          <label for="wf_c_words">مع الكلمات العربية / With Arabic Words</label>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-grid">
        <div class="footer-col">
          <h4>الوصف / Description</h4>
          <p>هذا مشروع مفتوح المصدر لترجمة العربية إلى IPA.</p>
          <p>This is an open-source project to translate Arabic to IPA.</p>
        </div>

        <div class="footer-col">
          <h4>Other Languages</h4>
          <ul class="lang-list" id="lang-buttons-container">
          </ul>
        </div>

        <div class="footer-col">
          <h4>الروابط المفيدة / Useful Links</h4>
          <ul>
            <li><a href="./ipa_list.html">قاعدة بيانات IPA / IPA Database (Arabic)</a></li>
          </ul>
        </div>
      </div>

      <div class="footer-bottom">
        <p>
          <a href="https://github.com/lotusfa/IPA-Translator">GitHub</a>
          &nbsp;|&nbsp;
          Power By: <a href="https://lotusfa.com/">LOTUS FA</a>
        </p>
      </div>
    </footer>

    <script type="module" src="./main.js"></script>
    <script type="module">
      import { initLanguageButtons } from '../js/ipa-core.js';
      initLanguageButtons({
        containerId: "lang-buttons-container",
        configPath: "../config/languages.json"
      });
    </script>
  </body>
</html>
