<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>日本語単語音標 - Japanese IPA List</title>
    <link rel="icon" href="../favicon.svg" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="header">
      <div class="titles">
        <h1>日本語単語音標</h1>
        <h2>Japanese IPA List</h2>
      </div>
      <button id="dark-mode-toggle" class="btn-theme" aria-label="Toggle dark mode">
        <img src="../img/light-mode.svg" class="icon" alt="" />
      </button>
    </div>
    <hr />

      <div class="row" style="margin-bottom: 15px;">
        <div class="col" style="flex: 0 0 auto;">
          <h5 style="margin: 0;"><a href="./index.html">← Back to Translator</a></h5>
        </div>
      </div>

    <div class="container">
      <table id="DataTable" class="table table-striped">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Japanese Word</th>
            <th scope="col">IPA</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <small>This may need few seconds for loading...</small>
    </div>

    <footer class="footer">
      <div class="footer-grid">
        <div class="footer-col">
          <h4>Description</h4>
          <p>Japanese IPA word list.</p>
        </div>

        <div class="footer-col">
          <h4>Other Languages</h4>
          <ul class="lang-list" id="lang-buttons-container">
            
</ul>
        </div>

        <div class="footer-col">
          <h4>Useful Links</h4>
          <ul>
            <li><a href="./ipa_list.html">IPA Database</a></li>
            <li><a href="https://en.wikipedia.org/wiki/Help:IPA/Japanese">WIKI - IPA/Japanese</a></li>
            <li><a href="https://open-dict-data.github.io/ipa-lookup/ja/">Japanese IPA Lookup</a></li>
          </ul>
        </div>
      </div>

      <div class="footer-bottom">
        <p>
          <a href="https://github.com/lotusfa/IPA-Translator">GitHub</a>
          &nbsp;|&nbsp;
          Power By: <a href="https://lotusfa.com/">LOTUS FA</a>
        </p>
      </div>
    </footer>

    <script src="../lib/jquery/jquery.min.js"></script>
    <script src="../lib/datatables/datatables.min.js"></script>
    <link rel="stylesheet" type="text/css" href="../lib/datatables/datatables.min.css"/>
    
    <script type="text/javascript">
      // Dark mode toggle
      const darkModeToggle = document.getElementById('dark-mode-toggle');
      const iconImg = darkModeToggle.querySelector('.icon');
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
        iconImg.src = '../img/dark-mode.svg';
      } else {
        iconImg.src = '../img/light-mode.svg';
      }

      darkModeToggle.addEventListener('click', function() {
        darkModeToggle.classList.add('btn-theme-transition');
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        iconImg.src = isDark ? '../img/dark-mode.svg' : '../img/light-mode.svg';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      });

      $(document).ready(function() {
        $('#DataTable').DataTable({
          "ajax": {
            url: '../json/ja.json',
            dataSrc: function (json) {
              const dataObj = json.ja[0];
              return Object.entries(dataObj).map(([entry, ipa], index) => [index + 1, entry, ipa]);
            }
          }
        });
      });
    </script>
    <script type="module">
      import { initLanguageButtons } from '../js/ipa-core.js';
      initLanguageButtons({
        containerId: "lang-buttons-container",
        configPath: "../config/languages.json"
      });
    </script>
  </body>
</html>
