<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IPA Wortliste - Deutsch</title>
    <link rel="icon" href="../favicon.svg" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div class="header">
      <div class="titles">
        <h1>IPA Wortliste</h1>
        <h2>Deutsch</h2>
      </div>
      <button id="dark-mode-toggle" class="btn-theme" aria-label="Toggle dark mode">
        <img src="../img/light-mode.svg" class="icon" alt="" />
      </button>
    </div>
    <hr />

    <div class="container">
      <div class="row" style="margin-bottom: 15px;">
        <div class="col" style="flex: 0 0 auto;">
          <h5 style="margin: 0;"><a href="./index.html">← Zurück zum Übersetzer (Back to Translator)</a></h5>
        </div>
      </div>

      <div class="row">
        <div class="col">
          <div class="table-responsive">
          <table class="table table-striped display" id="DataTable">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Deutsches Wort</th>
                <th scope="col">IPA</th>
              </tr>
            </thead>
            <tbody id="tbody">
            </tbody>
          </table>
</div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-grid">
        <div class="footer-col">
          <h4>Beschreibung</h4>
          <p>Deutsche IPA-Wortliste mit Standardaussprache.</p>
        </div>

        <div class="footer-col">
          <h4>Andere Sprachen</h4>
          <ul class="lang-list" id="lang-buttons-container">
          </ul>
        </div>

        <div class="footer-col">
          <h4>Nützliche Links</h4>
          <ul>
            <li><a href="./ipa_list.html">IPA-Datenbank</a></li>
            <li><a href="https://en.wikipedia.org/wiki/Help:IPA_for_Germany">WIKI - IPA/Deutsch</a></li>
            <li><a href="https://open-dict-data.github.io/ipa-lookup/de/">Deutsche IPA-Suche</a></li>
          </ul>
        </div>
      </div>

      <div class="footer-bottom">
        <p>
          <a href="https://github.com/lotusfa/IPA-Translator">GitHub</a>
          &nbsp;|&nbsp;
          Power By: <a href="https://lotusfa.com/">LOTUS FA</a>
        </p>
      </div>
    </footer>

    <script src="../lib/jquery/jquery.min.js"></script>
    <script src="../lib/datatables/datatables.min.js"></script>
    <link rel="stylesheet" type="text/css" href="../lib/datatables/datatables.min.css"/>

    <script type="text/javascript">
      // Dark mode toggle
      const darkModeToggle = document.getElementById('dark-mode-toggle');
      const iconImg = darkModeToggle.querySelector('.icon');
      const lightModeIcon = '../img/light-mode.svg';
      const darkModeIcon = '../img/dark-mode.svg';

      // Check for saved dark mode preference (using same key as main.js)
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
        iconImg.src = darkModeIcon;
      } else {
        iconImg.src = lightModeIcon;
      }

      darkModeToggle.addEventListener('click', () => {
        darkModeToggle.classList.add('btn-theme-transition');
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        iconImg.src = isDark ? darkModeIcon : lightModeIcon;
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      });

      // Initialize DataTable
      $(document).ready(function() {
          $('#DataTable').DataTable( {
              "ajax": {
                url: '../json/de.json',
                dataSrc: function (json) {
                  const dataObj = json.de[0];
                  return Object.entries(dataObj).map(([entry, ipa], index) => [index + 1, entry, ipa]);
              }
            }
          }
        );
      } );
    </script>
    <script type="module">
      import { initLanguageButtons } from '../js/ipa-core.js';
      initLanguageButtons({
        containerId: "lang-buttons-container",
        configPath: "../config/languages.json"
      });
    </script>
  </body>
</html>
