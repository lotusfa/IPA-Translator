<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>粵語拼音翻譯器 - Cantonese IPA Translator</title>
    <link rel="icon" href="../favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="header">
      <div class="titles">
        <h1>粵語拼音翻譯器</h1>
        <h2>Cantonese IPA Translator</h2>
      </div>
      <button id="dark-mode-toggle" class="btn-theme" aria-label="Toggle dark mode">
        <span class="icon">🌙</span>
      </button>
    </div>
    <hr />

    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>中文字 (Chinese)</label>
          <textarea id="cWords_tBox" rows="10" placeholder="輸入廣東話文字...">
國際音標，早期又稱萬國音標，是一套用來標音的系統，以拉丁字母為基礎，由國際語音學學會設計來作為口語聲音的標準化標示方法。</textarea
          >
        </div>
      </div>

      <div class="col">
        <div class="form-group">
          <label>拼音 (IPA)</label>
          <textarea id="IPA_tBox" rows="10" disabled></textarea>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="form-check-inline" style="align-items: baseline; margin-bottom: 5px;">
          <span style="font-weight: 500; margin-right: 5px;">Format:</span>
          <input type="radio" name="format" id="IPA_num" checked />
          <label for="IPA_num">/nei13/</label>
        </div>
        <div class="form-check-inline">
          <input type="radio" name="format" id="IPA_org" />
          <label for="IPA_org">/nei˩˧/</label>
        </div>
        <div class="form-check-inline">
          <input type="radio" name="format" id="Jyutping" />
          <label for="Jyutping">/nei5/</label>
        </div>
      </div>
      <div class="col-md-6">
        <div class="form-check-inline">
          <input type="checkbox" id="wf_c_words" checked />
          <label for="wf_c_words">With Chinese Words</label>
        </div>
        <div class="form-check-inline">
          <input type="checkbox" id="allow_words_search" checked />
          <label for="allow_words_search">Allow Words Search</label>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-grid">
        <div class="footer-col">
          <h4>說明</h4>
          <p>這是一個開源專案，用於將廣東話轉換為國際音標。</p>
        </div>

        <div class="footer-col">
          <h4>其他語言</h4>
          <ul class="lang-list">
            <li><a href="../cantonese/index.html">Cantonese (廣東話)</a></li>
            <li><a href="../mandarin/index.html">Mandarin (普通話)</a></li>
            <li><a href="../english/index.html">English</a></li>
            <li><a href="../french/index.html">French</a></li>
            <li><a href="../esperanto/index.html">Esperanto</a></li>
            <li><a href="../persian/index.html">Persian</a></li>
            <li><a href="../spanish/index.html">Spanish</a></li>
            <li><a href="../japanese/index.html">Japanese</a></li>
          </ul>
        </div>

        <div class="footer-col">
          <h4>連結</h4>
          <ul>
            <li><a href="./ipa_list.html">IPA 資料庫</a></li>
            <li><a href="https://zh.wikipedia.org/wiki/粵語拼音對照表">粵語拼音對照表 (WIKI)</a></li>
            <li><a href="http://humanum.arts.cuhk.edu.hk/Lexis/lexi-can/">粵語審音配詞字庫 (CUHK)</a></li>
            <li><a href="https://open-dict-data.github.io/ipa-lookup/yue/">粵語國際音標查詢</a></li>
          </ul>
        </div>
      </div>

      <div class="footer-bottom">
        <p>
          <a href="https://github.com/lotusfa/IPA-Translator">GitHub</a>
          &nbsp;|&nbsp;
          Power By: <a href="https://lotusfa.com/">LOTUS FA</a>
        </p>
      </div>
    </footer>

    <script src="./main.js"></script>
  </body>
</html>
