<!doctype html>
<html lang="or">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IPA Translator - Odia</title>
    <link rel="icon" href="../favicon.svg" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="header">
      <div class="titles">
        <h1>IPA Translator</h1>
        <h2>Odia</h2>
      </div>
      <button id="dark-mode-toggle" class="btn-theme" aria-label="Toggle dark mode">
        <img src="../img/light-mode.svg" class="icon" alt="" />
      </button>
    </div>
    <hr />

    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>Odia paragraph</label>
          <textarea id="cWords_tBox" rows="10" placeholder="Input some Odia words.">ଓଡ଼ିଆ</textarea>
        </div>
      </div>

      <div class="col">
        <div class="form-group">
          <label>IPA</label>
          <textarea id="IPA_tBox" rows="10" disabled></textarea>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="form-check-inline" style="align-items: baseline; margin-bottom: 5px;">
          <span style="font-weight: 500; margin-right: 5px;">Format:</span>
          <input type="radio" name="outputFormat" id="IPA_org" checked />
          <label for="IPA_org">IPA_org</label>
        </div>
        <div class="form-check-inline">
          <input type="radio" name="outputFormat" id="IPA_num" />
          <label for="IPA_num">IPA_num</label>
        </div>
      </div>
      <div class="col-md-6">
        <div class="form-check-inline">
          <input type="checkbox" id="wf_c_words" checked />
          <label for="wf_c_words">With Words</label>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-grid">
        <div class="footer-col">
          <h4>Description</h4>
          <p>This is an open-source project to translate Odia to IPA.</p>
        </div>

        <div class="footer-col">
          <h4>Other Languages</h4>
          <ul class="lang-list" id="lang-buttons-container"></ul>
        </div>

        <div class="footer-col">
          <h4>Useful Links</h4>
          <ul>
            <li><a href="./ipa_list.html">IPA Database (Odia)</a></li>
            <li><a href="https://en.wikipedia.org/wiki/Odia_language">WIKI - Odia Language</a></li>
          </ul>
        </div>
      </div>

      <div class="footer-bottom">
        <p>
          <a href="https://github.com/lotusfa/IPA-Translator">GitHub</a>
          &nbsp;|&nbsp;
          Power By: <a href="https://lotusfa.com/">LOTUS FA</a>
        </p>
      </div>
    </footer>

    <script type="module" src="./main.js"></script>
  <script type="module">
     import { initLanguageButtons } from '../js/ipa-core.js';
     initLanguageButtons({
       containerId: "lang-buttons-container",
       configPath: "../config/languages.json"
     });
   </script>
</body>
</html>
