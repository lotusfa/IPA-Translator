<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lista IPA - Español</title>
    <link rel="icon" href="../favicon.svg" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../lib/datatables/dataTables.bootstrap4.min.css" />
  </head>
  <body>
    <div class="header">
      <div class="titles">
        <h1>Lista IPA</h1>
        <h2>Español</h2>
      </div>
      <button id="dark-mode-toggle" class="btn-theme" aria-label="Toggle dark mode">
        <img src="../img/light-mode.svg" class="icon" alt="" />
      </button>
    </div>
    <hr />

    <div class="container">
      <div class="row" style="margin-bottom: 15px;">
        <div class="col" style="flex: 0 0 auto;">
          <h5 style="margin: 0;"><a href="./index.html">← Back to Translator</a></h5>
        </div>
      </div>
      <table id="DataTable" class="table table-striped display">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Palabra Española</th>
            <th scope="col">IPA</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <small>This may need few seconds for loading...</small>
    </div>

    <script src="../lib/jquery/jquery.min.js"></script>
    <script src="../lib/datatables/datatables.min.js"></script>
    <link rel="stylesheet" type="text/css" href="../lib/datatables/datatables.min.css"/>

    <script type="text/javascript">
      $(document).ready(function() {
        $('#DataTable').DataTable({
          "ajax": {
            url: '../json/es_ES.json',
            dataSrc: function (json) {
              const dataObj = json.es_ES[0];
              return Object.entries(dataObj).map(([entry, ipa], index) => [index + 1, entry, ipa]);
            }
          }
        });
      });
    </script>
  </body>
</html>
