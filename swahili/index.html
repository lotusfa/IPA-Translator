<!doctype html>
<html lang="sw">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IPA Translator - Swahili</title>
    <link rel="icon" href="../favicon.svg" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="header">
      <div class="titles">
        <h1>Tafsiri ya IPA</h1>
        <h2>Swahili</h2>
      </div>
      <button id="dark-mode-toggle" class="btn-theme" aria-label="Toggle dark mode">
        <img src="../img/light-mode.svg" class="icon" alt="" />
      </button>
    </div>
    <hr />

    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>Ki-swahili / Swahili text</label>
          <textarea id="cWords_tBox" rows="10" placeholder="Input some Swahili words.">Habari yako? Ni mzuri. Tunasoma lugha ya Swahili.</textarea>
        </div>
      </div>

      <div class="col">
        <div class="form-group">
          <label>IPA</label>
          <textarea id="IPA_tBox" rows="10" disabled></textarea>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-12">
        <div class="form-check-inline">
          <input type="checkbox" id="wf_c_words" checked />
          <label for="wf_c_words">With Swahili Words</label>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-grid">
        <div class="footer-col">
          <h4>Maelezo / Description</h4>
          <p>Hii ni mradi wa wazi wa tafsiri ya Kiswahili kwenda IPA.</p>
          <p>This is an open-source project to translate Swahili to IPA.</p>
        </div>

        <div class="footer-col">
          <h4>Other Languages</h4>
          <ul class="lang-list" id="lang-buttons-container"></ul>
        </div>

        <div class="footer-col">
          <h4>Vyanzo Muhimu / Useful Links</h4>
          <ul>
            <li><a href="./ipa_list.html">IPA Database</a></li>
            <li><a href="https://en.wikipedia.org/wiki/Help:IPA_for_English">WIKI - IPA</a></li>
          </ul>
        </div>
      </div>

      <div class="footer-bottom">
        <p>
          <a href="https://github.com/lotusfa/IPA-Translator">GitHub</a>
          &nbsp;|&nbsp;
          Power By: <a href="https://lotusfa.com/">LOTUS FA</a>
        </p>
      </div>
    </footer>

        <script type="module">
      import { initLanguageButtons } from '../js/ipa-core.js';
      initLanguageButtons({
        containerId: "lang-buttons-container",
        configPath: "../config/languages.json"
      });
    </script>
<script type="module" src="./main.js"></script>
  </body>
</html>
