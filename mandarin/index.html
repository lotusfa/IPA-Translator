<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>普通話拼音翻譯器 - Mandarin IPA Translator</title>
    <link rel="icon" href="../favicon.svg" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="header">
      <div class="titles">
        <h1>普通話拼音翻譯器</h1>
        <h2>Mandarin IPA Translator</h2>
      </div>
      <button id="dark-mode-toggle" class="btn-theme" aria-label="Toggle dark mode">
        <img src="../img/light-mode.svg" class="icon" alt="" />
      </button>
    </div>
    <hr />
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>中文字 (Chinese)</label>
          <textarea id="cWords_tBox" rows="10" placeholder="輸入普通話文字...">國際音標是一種以拉丁字母為基礎的標音系統，19世紀末由國際語音學學會設計。 </textarea>
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>標音（IPA）</label>
          <textarea id="IPA_tBox" rows="10" disabled></textarea>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-6">
        <div class="form-check-inline" style="align-items: baseline; margin-bottom: 5px;">
          <span style="font-weight: 500; margin-right: 5px;">格式：</span>
          <input type="radio" name="format" id="IPA_num" checked />
          <label for="IPA_num">/kuɔ35/</label>
        </div>
        <div class="form-check-inline">
          <input type="radio" name="format" id="IPA_org" />
          <label for="IPA_org">/kuɔ˧˥/</label>
        </div>
        <div class="form-check-inline">
          <input type="radio" name="format" id="Jyutping_num" />
          <label for="Jyutping_num">/kuɔ2/</label>
        </div>
        <div class="form-check-inline">
          <input type="radio" name="format" id="Jyutping" />
          <label for="Jyutping">/kuɔˊ/</label>
        </div>
      </div>
      <div class="col-md-6">
        <div class="form-check-inline" style="align-items: baseline; margin-bottom: 5px;">
          <span style="font-weight: 500; margin-right: 5px;">繁/簡:</span>
          <input type="radio" name="zhTypeOption" id="zh_type1" checked />
          <label for="zh_type1">繁體</label>
        </div>
        <div class="form-check-inline">
          <input type="radio" name="zhTypeOption" id="zh_type2" />
          <label for="zh_type2">简体</label>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <div class="form-check-inline">
          <input type="checkbox" id="wf_c_words" checked />
          <label for="wf_c_words">保留中文字</label>
        </div>
        <div class="form-check-inline">
          <input type="checkbox" id="allow_words_search" checked />
          <label for="allow_words_search">分詞</label>
        </div>
      </div>
    </div>
    <footer class="footer">
      <div class="footer-grid">
        <div class="footer-col">
          <h4>說明 (Description)</h4>
          <p>這是一個開源專案，用於將普通話轉換為國際音標。</p>
          <p>This is an open-source project to translate Mandarin to IPA.</p>
        </div>
        <div class="footer-col">
          <h4>Other Languages</h4>
          <ul class="lang-list" id="lang-buttons-container">
          </ul>
        </div>
        <div class="footer-col">
          <h4>Useful Links</h4>
          <ul>
            <li><a href="https://github.com/lotusfa/IPA-Translator">GitHub</a></li>
            <li><a href="./ipa_list_zh_hans.html">IPA Database (簡體)</a></li>
            <li><a href="./ipa_list_zh_hant.html">IPA Database (繁體)</a></li>
            <li><a href="https://open-dict-data.github.io/ipa-lookup/zh/">漢語國際音標查詢</a></li>
            <li><a href="https://en.wikipedia.org/wiki/International_Phonetic_Alphabet">IPA Wiki</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>
          <a href="https://github.com/lotusfa/IPA-Translator">GitHub</a>
          &nbsp;|&nbsp;
          Power By: <a href="https://lotusfa.com/">LOTUS FA</a>
        </p>
      </div>
    </footer>
    <script type="module" src="./main.js"></script>
    <script type="module">
      import { initLanguageButtons } from '../js/ipa-core.js';
      initLanguageButtons({
        containerId: "lang-buttons-container",
        configPath: "../config/languages.json"
      });
    </script>
  </body>
</html>
